name: 🚀 Build, Package, and Release (Nuitka & SignPath)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Number (e.g., 2.8.1 or 2.4B)'
        required: true
        default: '2.5.0'
      post_release_only:
        description: 'Solo VirusTotal + WinGet (release già pubblicata, usa workflow aggiornato)'
        type: boolean
        default: false
  release:
    types: [published]

env:
  RELEASE_VERSION: ${{ github.event.inputs.version }}

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  # =========================================================
  # 1. WINDOWS BUILD (Nuitka + Firma)
  # =========================================================
  build-windows:
    if: github.event_name == 'workflow_dispatch' && inputs.post_release_only != true
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
                
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # MODIFICA 1: Installiamo Nuitka e Zstandard
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka zstandard ordered-set

    - name: Restore Secret JSON
      shell: bash
      env:
        SECRET_CONTENT: ${{ secrets.CLIENT_SECRET_JSON }}
      run: |
        python -c "import os; open('cloud_utils/client_secret.json', 'w', encoding='utf-8').write(os.environ['SECRET_CONTENT'])"

    # MODIFICA: Nuitka con TUTTI gli asset (Icone, DB Giochi e SECRET DI GOOGLE)
    - name: Run Nuitka Build
      shell: powershell
      run: |
        # 1. Pulizia della versione (supporta lettere opzionali come 2.4B)
        $rawVersion = "${{ env.RELEASE_VERSION }}"
        # Extract version: digits and dots, optionally followed by a letter (A-Z)
        if ($rawVersion -match '(\d+(\.\d+)+[A-Za-z]?)') {
            $fullVersion = $matches[0]
            # For Nuitka's file-version (expects numeric only), strip the letter
            if ($fullVersion -match '(\d+(\.\d+)+)') {
                $cleanVersion = $matches[0]
            } else {
                $cleanVersion = "1.0.0"
            }
        } else {
            $fullVersion = "1.0.0"
            $cleanVersion = "1.0.0"
        }
        Write-Host "Versione completa: $fullVersion"
        Write-Host "Versione numerica per Nuitka: $cleanVersion"

        # 2. Comando Nuitka Finale
        # Rimosso: --nofollow-import-to
        # Metadata e --onefile-no-compression aggiunti per ridurre falsi positivi AV
        
        python -m nuitka --onefile --standalone `
          --enable-plugin=pyside6 `
          --windows-console-mode=disable `
          --onefile-tempdir-spec="%TEMP%\SaveState" `
          --onefile-no-compression `
          --company-name="SaveState[OSS]" `
          --product-name="SaveState" `
          --file-description="SaveState - Game Save Backup Manager. Open source tool for backing up and restoring video game saves." `
          --file-version="$cleanVersion" `
          --product-version="$cleanVersion" `
          --copyright="Copyright (C) 2024-2026 Matteo842 - Licensed under GPL-3.0 - https://github.com/Matteo842/SaveState" `
          --trademark="SaveState is free and open source software distributed under the GNU General Public License v3.0" `
          --windows-icon-from-ico=icon.ico `
          --output-dir=dist `
          --output-filename=SaveState.exe `
          --assume-yes-for-downloads `
          --include-module=winshell `
          --include-module=win32com `
          --include-module=vdf `
          --include-module=nbtlib `
          --include-module=thefuzz `
          --include-module=psutil `
          --include-module=xml.etree.ElementTree `
          --include-module=configparser `
          --include-package-data=googleapiclient `
          --include-data-dir=icons=icons `
          --include-data-file=icon.png=icon.png `
          --include-data-file=backup/backup_runner.py=backup_runner.py `
          --include-data-file=emulator_utils/citra_titles_map.pkl=emulator_utils/citra_titles_map.pkl `
          --include-data-file=emulator_utils/switch_game_map.pkl=emulator_utils/switch_game_map.pkl `
          --include-data-file=emulator_utils/ps4_game_map.pkl=emulator_utils/ps4_game_map.pkl `
          --include-data-file=emulator_utils/xenia_title_map.pkl=emulator_utils/xenia_title_map.pkl `
          --include-data-file=cloud_utils/client_secret.json=cloud_utils/client_secret.json `
          main.py

    # --- SIGNPATH (Nessuna modifica necessaria qui) ---
    - name: Upload Unsigned EXE
      id: upload_step
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-exe
        path: dist/SaveState.exe
        retention-days: 1

    - name: Sign with SignPath
      uses: signpath/github-action-submit-signing-request@v1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
        project-slug: "SaveState"
        signing-policy-slug: "release-signing"
        artifact-configuration-slug: "zip-with-exe"
        github-artifact-id: ${{ steps.upload_step.outputs.artifact-id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        wait-for-completion: true 
        output-artifact-directory: "dist_signed_temp"

    - name: Handle Signed Artifact
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path dist_signed_final
        $exeFile = Get-ChildItem dist_signed_temp\*.exe | Select-Object -First 1
        $zipFile = Get-ChildItem dist_signed_temp\*.zip | Select-Object -First 1

        if ($exeFile) {
            Move-Item -Path $exeFile.FullName -Destination dist_signed_final\SaveState.exe
        }
        elseif ($zipFile) {
            Expand-Archive -Path $zipFile.FullName -DestinationPath dist_signed_final
        }
        else {
            exit 1
        }

    # --- IMPACCHETTAMENTO WINDOWS ---
    - name: Create Release Zip Package
      shell: powershell
      run: |
        $zipName = "SaveState_v${{ env.RELEASE_VERSION }}_Win.zip"
        mkdir release_pack
        copy dist_signed_final\SaveState.exe release_pack\
        copy LICENSE release_pack\
        copy README.md release_pack\
        Compress-Archive -Path release_pack\* -DestinationPath $zipName
        
    - name: Upload Windows Package
      uses: actions/upload-artifact@v4
      with:
        name: SaveState-Windows-Package
        path: SaveState_v${{ env.RELEASE_VERSION }}_Win.zip

  # =========================================================
  # 2. LINUX BUILD (Lasciato invariato o puoi usare Nuitka anche qui)
  # =========================================================
  build-linux:
    if: github.event_name == 'workflow_dispatch' && inputs.post_release_only != true
    runs-on: ubuntu-latest
    steps:
    - name: ⬇️ Checkout Repository
      uses: actions/checkout@v4
      
    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: 📦 Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev fuse libfuse2 file
        python3 -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 🔐 Restore Secret JSON
      shell: bash  
      env:
        SECRET_CONTENT: ${{ secrets.CLIENT_SECRET_JSON }}
      run: |
        python -c "import os; open('cloud_utils/client_secret.json', 'w', encoding='utf-8').write(os.environ['SECRET_CONTENT'])"

    - name: 🔨 Run PyInstaller (Linux)
      run: pyinstaller --clean SaveState-OneFile-Linux.spec

    # --- CREAZIONE APPIMAGE (Logica Icone Avanzata) ---
    - name: 🖼️ Prepare AppDir Structure
      run: |
        rm -rf AppDir
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
        mkdir -p AppDir/usr/share/pixmaps/

        cp dist/SaveState AppDir/usr/bin/
        cp icon.png AppDir/SaveState.png
        cp icon.png AppDir/usr/share/pixmaps/SaveState.png
        ln -s ../../../../../../SaveState.png AppDir/usr/share/icons/hicolor/256x256/apps/SaveState.png
        cd AppDir
        ln -s SaveState.png .DirIcon
        cd ..

    - name: 📝 Create .desktop file
      run: |
        cat > AppDir/SaveState.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=SaveState
        Exec=SaveState
        Icon=SaveState
        Categories=Utility;
        Terminal=false
        StartupWMClass=SaveState
        EOF

    - name: 🚀 Build AppImage
      run: |
        wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
        chmod +x appimagetool
        ln -s usr/bin/SaveState AppDir/AppRun
        ARCH=x86_64 ./appimagetool AppDir SaveState.AppImage
        cp SaveState.AppImage "SaveState_v${{ env.RELEASE_VERSION }}.AppImage"

    - name: 🗄️ Create Release Tarball Package
      run: |
        DIR_NAME="SaveState" 
        TARBALL_NAME="SaveState_v${{ env.RELEASE_VERSION }}_Linux.tar.xz"
        mkdir -p "$DIR_NAME"
        mv "SaveState.AppImage" "$DIR_NAME/"
        cp LICENSE "$DIR_NAME/"
        cp README.md "$DIR_NAME/"
        # Use XZ with maximum compression (-9e) for better compression on already-compressed AppImage
        tar -cvf - "$DIR_NAME" | xz -9e --threads=0 > "$TARBALL_NAME"
        echo "📦 Dimensione pacchetto finale:"
        ls -lh "$TARBALL_NAME"

    - name: ⬆️ Upload Linux Tarball Package
      uses: actions/upload-artifact@v4
      with:
        name: SaveState-Linux-Package
        path: "SaveState_v${{ env.RELEASE_VERSION }}_Linux.tar.xz"

    - name: ⬆️ Upload Standalone AppImage
      uses: actions/upload-artifact@v4
      with:
        name: SaveState-AppImage-Standalone
        path: "SaveState_v${{ env.RELEASE_VERSION }}.AppImage"

  # =========================================================
  # 3. RELEASE CREATION
  # =========================================================
  create-release:
    if: github.event_name == 'workflow_dispatch' && inputs.post_release_only != true
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ⬇️ Download all artifacts
        uses: actions/download-artifact@v4

      - name: 🚀 Create Release with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          AUTO_NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="v${{ env.RELEASE_VERSION }}" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body)

          {
            echo "### Windows"
            echo ""
            echo "Scarica **SaveState_v${{ env.RELEASE_VERSION }}_Win.zip** (contiene SaveState.exe, LICENSE e README)."
            echo ""
            echo "_Il badge VirusTotal dell'exe viene aggiunto automaticamente alla pubblicazione._"
            echo ""
            echo "---"
            echo ""
            echo "$AUTO_NOTES"
          } > release_notes.md

          echo "Creating Release v${{ env.RELEASE_VERSION }}..."
          gh release create "v${{ env.RELEASE_VERSION }}" \
            SaveState-Windows-Package/* \
            SaveState-Linux-Package/* \
            SaveState-AppImage-Standalone/* \
            --title "SaveState v${{ env.RELEASE_VERSION }}" \
            --draft \
            --notes-file release_notes.md

  # =========================================================
  # 4. VIRUSTOTAL (estrae l'exe dallo zip pubblico — niente exe sfuso in release)
  # =========================================================
  scan-virustotal:
    if: >-
      (github.event_name == 'release' &&
       github.event.release.draft == false &&
       github.event.release.prerelease == false) ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.post_release_only == true)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: 🛡️ Scan Windows EXE with VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_RELEASE_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VT_API="https://www.virustotal.com/api/v3"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi
          VERSION="${TAG#v}"
          ZIP_NAME="SaveState_v${VERSION}_Win.zip"
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          EXE="/tmp/vt_extract/SaveState.exe"

          vt_request() {
            local method="$1"
            local url="$2"
            shift 2
            local attempt http_code

            for attempt in 1 2 3 4 5; do
              http_code=$(curl -sS -o /tmp/vt_response.json -w "%{http_code}" \
                -X "$method" \
                -H "Accept: application/json" \
                -H "x-apikey: $VT_API_KEY" \
                "$@" \
                "$url")

              if [ "$http_code" = "429" ] || [ "$http_code" = "503" ]; then
                echo "VirusTotal rate limit/transient error (HTTP $http_code), retry $attempt/5..." >&2
                sleep $((attempt * 20))
                continue
              fi

              echo "$http_code"
              return 0
            done

            echo "VirusTotal request failed after retries (last HTTP $http_code)" >&2
            cat /tmp/vt_response.json || true
            exit 1
          }

          vt_assert_json() {
            if ! jq empty /tmp/vt_response.json 2>/dev/null; then
              echo "VirusTotal returned non-JSON response:" >&2
              cat /tmp/vt_response.json
              exit 1
            fi
          }

          echo "Downloading Windows zip (GPL bundle with LICENSE + README):"
          echo "$ZIP_URL"
          curl -sSL -o /tmp/win.zip "$ZIP_URL"
          mkdir -p /tmp/vt_extract
          unzip -j /tmp/win.zip SaveState.exe -d /tmp/vt_extract

          SHA256=$(sha256sum "$EXE" | awk '{print $1}')
          FILE_SIZE=$(stat -c%s "$EXE")
          echo "SaveState.exe SHA256: $SHA256 ($FILE_SIZE bytes)"

          HTTP_CODE=$(vt_request GET "$VT_API/files/$SHA256")
          if [ "$HTTP_CODE" = "200" ]; then
            cp /tmp/vt_response.json /tmp/vt_report.json
            echo "File already known to VirusTotal."
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Uploading SaveState.exe to VirusTotal..."
            sleep 15

            if [ "$FILE_SIZE" -gt 33554432 ]; then
              HTTP_CODE=$(vt_request GET "$VT_API/files/upload_url")
              vt_assert_json
              UPLOAD_URL=$(jq -r '.data' /tmp/vt_response.json)
              sleep 15
              HTTP_CODE=$(curl -sS -o /tmp/vt_response.json -w "%{http_code}" \
                -X POST \
                -H "Accept: application/json" \
                -H "x-apikey: $VT_API_KEY" \
                --form "file=@$EXE" \
                "$UPLOAD_URL")
            else
              HTTP_CODE=$(curl -sS -o /tmp/vt_response.json -w "%{http_code}" \
                -X POST \
                -H "Accept: application/json" \
                -H "x-apikey: $VT_API_KEY" \
                --form "file=@$EXE" \
                "$VT_API/files")
            fi

            vt_assert_json
            if [ "$HTTP_CODE" != "200" ]; then
              echo "VirusTotal upload failed (HTTP $HTTP_CODE)"
              jq . /tmp/vt_response.json || cat /tmp/vt_response.json
              exit 1
            fi

            ANALYSIS_ID=$(jq -r '.data.id // empty' /tmp/vt_response.json)
            for attempt in $(seq 1 40); do
              sleep 15
              HTTP_CODE=$(vt_request GET "$VT_API/analyses/$ANALYSIS_ID")
              vt_assert_json
              STATUS=$(jq -r '.data.attributes.status // empty' /tmp/vt_response.json)
              echo "VirusTotal analysis status ($attempt/40): ${STATUS:-unknown}"
              if [ "$STATUS" = "completed" ]; then
                break
              fi
            done

            sleep 15
            HTTP_CODE=$(vt_request GET "$VT_API/files/$SHA256")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Failed to fetch VirusTotal file report (HTTP $HTTP_CODE)"
              exit 1
            fi
            cp /tmp/vt_response.json /tmp/vt_report.json
          else
            echo "Unexpected VirusTotal lookup response: HTTP $HTTP_CODE"
            cat /tmp/vt_response.json
            exit 1
          fi

          MALICIOUS=$(jq -r '.data.attributes.last_analysis_stats.malicious // 0' /tmp/vt_report.json)
          SUSPICIOUS=$(jq -r '.data.attributes.last_analysis_stats.suspicious // 0' /tmp/vt_report.json)
          DETECTIONS=$((MALICIOUS + SUSPICIOUS))
          TOTAL=$(jq -r '[.data.attributes.last_analysis_stats | to_entries[] | .value] | add // 0' /tmp/vt_report.json)

          if [ "$DETECTIONS" -eq 0 ]; then
            COLOR="brightgreen"
            LABEL="${DETECTIONS}/${TOTAL}%20Safe"
            ALT="VirusTotal - Safe"
          elif [ "$DETECTIONS" -le 2 ]; then
            COLOR="yellow"
            LABEL="${DETECTIONS}/${TOTAL}%20Detections"
            ALT="VirusTotal - ${DETECTIONS}/${TOTAL} Detections"
          else
            COLOR="red"
            LABEL="${DETECTIONS}/${TOTAL}%20Detections"
            ALT="VirusTotal - ${DETECTIONS}/${TOTAL} Detections"
          fi

          BADGE="[![${ALT}](https://img.shields.io/badge/VirusTotal-${LABEL}-${COLOR}?style=flat-square&logo=virustotal)](https://www.virustotal.com/gui/file/${SHA256}?nocache=1)"
          CURRENT_BODY=$(gh release view "$TAG" --json body --jq .body)

          export BADGE CURRENT_BODY
          python3 <<'PY'
          import os

          badge = os.environ["BADGE"]
          current = os.environ.get("CURRENT_BODY", "")
          marker_start = "<!-- vt-badge-start -->"
          marker_end = "<!-- vt-badge-end -->"
          section = (
              "### Windows — SaveState.exe\n\n"
              f"{marker_start}\n{badge}\n{marker_end}\n"
          )

          if marker_start in current:
              before, rest = current.split(marker_start, 1)
              _, after = rest.split(marker_end, 1)
              new_body = before.rstrip() + "\n\n" + section.rstrip() + after.lstrip("\n")
          elif "### Windows — SaveState.exe" in current:
              lines = current.splitlines()
              out = []
              skip = False
              for line in lines:
                  if line.strip() == "### Windows — SaveState.exe":
                      out.append(section.rstrip())
                      skip = True
                      continue
                  if skip:
                      if line.strip() == "---":
                          skip = False
                          out.append(line)
                      continue
                  out.append(line)
              new_body = "\n".join(out).strip() + "\n"
          else:
              new_body = section + "\n---\n\n" + current.lstrip("\n")

          with open("release_notes.md", "w", encoding="utf-8", newline="\n") as fh:
              fh.write(new_body)
          PY

          gh release edit "$TAG" --notes-file release_notes.md
          echo "Release notes updated with VirusTotal badge."

  # =========================================================
  # 5. WINGET (solo quando la release viene pubblicata)
  # =========================================================
  submit-winget:
    if: >-
      (github.event_name == 'release' &&
       github.event.release.draft == false &&
       github.event.release.prerelease == false) ||
      (github.event_name == 'workflow_dispatch' &&
       inputs.post_release_only == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: cargo-bins/cargo-binstall@main
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install komac
        run: cargo binstall komac -y
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Cleanup stale WinGet branches (incl. closed PRs)
        run: komac cleanup
        env:
          KOMAC_FORK_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}

      - name: Submit to WinGet
        env:
          KOMAC_FORK_OWNER: ${{ github.repository_owner }}
          KOMAC_CREATED_WITH: WinGet Releaser
          KOMAC_CREATED_WITH_URL: ${{ github.server_url }}/${{ github.repository }}/actions
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi
          VERSION="${TAG#v}"

          ZIP_URL=$(gh api "repos/${GH_REPO}/releases/tags/${TAG}" \
            --jq '.assets[] | select(.name | test("^SaveState_v.*_Win\\.zip$")) | .browser_download_url')
          if [ -z "$ZIP_URL" ]; then
            echo "Windows zip asset not found on release ${TAG}"
            exit 1
          fi

          komac sync

          set +e
          SUBMIT_OUTPUT=$(komac update 'Matteo842.SaveState' --version "$VERSION" --submit --urls "$ZIP_URL" 2>&1)
          SUBMIT_CODE=$?
          set -e
          echo "$SUBMIT_OUTPUT"

          if echo "$SUBMIT_OUTPUT" | grep -qi "Successfully created microsoft/winget-pkgs#"; then
            echo "WinGet PR created successfully."
            exit 0
          fi

          if echo "$SUBMIT_OUTPUT" | grep -qi "already a closed pull request"; then
            echo "A closed PR already exists for this version — creating a fresh branch and PR..."
            komac update 'Matteo842.SaveState' --version "$VERSION" --urls "$ZIP_URL"

            BRANCH=$(gh api "repos/${KOMAC_FORK_OWNER}/winget-pkgs/git/matching-refs/heads/Matteo842.SaveState-${VERSION}" \
              --jq 'sort_by(.ref) | last | .ref | sub("^refs/heads/"; "")')
            if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
              echo "Could not find komac branch for SaveState ${VERSION} on fork."
              exit 1
            fi

            gh pr create \
              --repo microsoft/winget-pkgs \
              --head "${KOMAC_FORK_OWNER}:${BRANCH}" \
              --title "New version: Matteo842.SaveState version ${VERSION}" \
              --body "Pull request has been created with [WinGet Releaser](https://github.com/vedantmgoyal9/winget-releaser) :rocket:

          Retry after a previously closed pull request for the same version."
            echo "WinGet PR created from branch ${BRANCH}."
            exit 0
          fi

          exit "${SUBMIT_CODE:-1}"